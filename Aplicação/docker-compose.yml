version: '3.8'

services:
  # --- FRONTEND (React + Nginx) ---
  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "8080:80" # Acessível no navegador em http://localhost:8080
    depends_on:
      - backend

  # --- BACKEND (Node.js) ---
  backend:
    build: ./backend
    container_name: node_backend
    restart: on-failure
    ports:
      - "3000:3000" # Acessível para o frontend em http://localhost:3000/api
    environment:
      - PORT=3000
      - JWT_SECRET=super_secret_key_123
      - POSTGRES_URI=postgres://admin:admin123@postgres_db:5432/userdb
      - MONGO_URI=mongodb://mongo_db:27017/recursosdb
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_started

  # --- BANCOS DE DADOS ---
  postgres_db:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo_db:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"